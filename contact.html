<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ASCENC - Entre em Contato</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Reset básico */
        html, body {
            height: 100%; /* Garante que o html e o body ocupem 100% da altura da tela */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* Organiza os elementos em coluna */
            font-family: Arial, sans-serif;
            background-color: #ffffff; /* Fundo branco */
        }

        /* Navbar */
        .navbar {
            background-color: #ffffff !important; /* Fundo branco */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Sombra leve */
            padding: 0.5rem 1rem; /* Espaçamento interno */
        }

        .navbar-brand img {
            height: 40px; /* Tamanho reduzido do logo */
        }

        .navbar-toggler {
            border: none; /* Remove a borda */
            padding: 0.5rem; /* Espaçamento interno */
        }

        .navbar-toggler-icon {
            background-color: #ffffff; /* Cor do ícone */
        }

        .navbar-nav .nav-link {
            font-size: 1rem; /* Aumentei o tamanho da fonte */
            padding: 0.5rem 1rem;
            color: #333333 !important;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .navbar-nav .nav-link:hover {
            color: #007bff !important; /* Cor ao passar o mouse */
        }

        /* Menu colapsado (mobile) */
        @media (max-width: 991.98px) {
            .navbar-collapse {
                background-color: #ffffff; /* Fundo branco */
                padding: 10px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                margin-top: 10px; /* Espaçamento acima do menu */
            }
        }

        /* Conteúdo principal */
        .content {
            flex: 1; /* Faz o conteúdo principal ocupar o espaço restante */
            padding-top: 80px; /* Espaçamento para não sobrepor a navbar */
            padding-bottom: 60px; /* Espaçamento para o footer */
        }

        /* Footer */
        footer {
            flex-shrink: 0; /* Impede que o footer encolha */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            width: 100%;
            margin-top: auto; /* Garante que o footer fique no final */
        }

        /* Ajustes para o formulário */
        .contact-form {
            background-color: #f8f9fa;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .contact-form .form-control {
            border-radius: 5px;
            border: 1px solid #ced4da;
        }

        .contact-form .form-control:focus {
            border-color: #80bdff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.25);
        }

        .contact-form .btn-primary {
            background-color: #007bff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
        }

        .contact-form .btn-primary:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/ASCENC_lateral.png" alt="ASCENC Logo" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link" href="papers.html">Artigos</a></li>
                    <li class="nav-item"><a class="nav-link" href="tools.html">Ferramentas</a></li>
                    <li class="nav-item"><a class="nav-link" href="team.html">Equipe</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo principal -->
    <div class="container content mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="contact-form">
                    <h1 class="text-center mb-4">Entre em Contato</h1>
                    <p class="text-center mb-4">Preencha o formulário abaixo para enviar sua dúvida ou sugestão.</p>
                    <form action="https://formsubmit.co/igorcmvaz@gmail.com" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="institution" class="form-label">Instituição</label>
                            <input type="text" class="form-control" id="institution" name="institution" required>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Dúvida/Sugestão</label>
                            <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">Enviar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-3">
        <p>&copy; 2025 ASCENC. Igor Catão Martins Vaz. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
